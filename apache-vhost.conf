<VirtualHost *:443>
    ServerName kb-mcp.216software.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/kb-mcp.216software.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kb-mcp.216software.com/privkey.pem

    # Proxy SSE connections to the MCP server
    ProxyPass /sse http://127.0.0.1:8000/sse
    ProxyPassReverse /sse http://127.0.0.1:8000/sse

    # Proxy message endpoint
    ProxyPass /messages http://127.0.0.1:8000/messages
    ProxyPassReverse /messages http://127.0.0.1:8000/messages

    # WebSocket support if needed
    RewriteEngine on
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{REQUEST_URI} ^/sse [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:8000/$1 [P,L]

    ProxyPreserveHost On
    ProxyRequests Off

    <Proxy *>
        Require all granted
    </Proxy>

    ErrorLog ${APACHE_LOG_DIR}/kb-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/kb-mcp-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName kb-gpt.216software.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/kb-gpt.216software.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kb-gpt.216software.com/privkey.pem

    # Proxy all requests to the GPT API server
    ProxyPass / http://127.0.0.1:8001/
    ProxyPassReverse / http://127.0.0.1:8001/

    ProxyPreserveHost On
    ProxyRequests Off

    <Proxy *>
        Require all granted
    </Proxy>

    ErrorLog ${APACHE_LOG_DIR}/kb-gpt-error.log
    CustomLog ${APACHE_LOG_DIR}/kb-gpt-access.log combined
</VirtualHost>
